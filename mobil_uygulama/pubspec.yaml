name: ecosync_ai
description: "EcoSync AI — Akıllı Ekosistem Platformu Mobil Uygulaması"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management — Riverpod
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Backend — Supabase
  supabase_flutter: ^2.5.3

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # Data Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # HTTP Client
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Google Gemini AI
  google_generative_ai: ^0.4.3

  # UI & Charts
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Utils
  intl: ^0.19.0
  logger: ^2.3.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Lint
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
